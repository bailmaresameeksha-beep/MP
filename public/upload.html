<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PDF Upload - Gate Master AI</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="/public/css/style.css" rel="stylesheet">
</head>
<body>
    <!-- Same navbar -->
    
    <div class="container mt-5 pt-5">
        <div class="row justify-content-center">
            <div class="col-lg-8">
                <div class="card shadow">
                    <div class="card-header bg-info text-white text-center">
                        <h3><i class="fas fa-file-pdf"></i> Smart PDF Processor</h3>
                        <p class="mb-0">Upload your notes → Get AI summaries + practice questions instantly!</p>
                    </div>
                    <div class="card-body p-5">
                        <div class="text-center mb-5">
                            <i class="fas fa-cloud-upload-alt fa-5x text-primary mb-4"></i>
                            <h4>Drop your PDF here or click to browse</h4>
                        </div>
                        
                        <form id="pdfForm" enctype="multipart/form-data">
                            <div class="mb-4">
                                <input type="file" class="form-control" id="pdfFile" accept=".pdf" required>
                            </div>
                            <div class="d-grid">
                                <button type="submit" class="btn btn-primary btn-lg btn-modern">
                                    <i class="fas fa-magic"></i> Process with AI
                                </button>
                            </div>
                        </form>

                        <div id="loading" style="display:none;" class="text-center mt-4">
                            <div class="spinner-border text-primary" role="status">
                                <span class="visually-hidden">Loading...</span>
                            </div>
                            <p class="mt-3">AI is processing your PDF... This may take 30-60 seconds</p>
                        </div>

                        <div id="results" style="display:none;">
                            <div class="row mt-4">
                                <div class="col-md-6">
                                    <div class="card h-100">
                                        <div class="card-header">
                                            <h6><i class="fas fa-list-ul"></i> AI Summary</h6>
                                        </div>
                                        <div class="card-body" id="summaryContent">
                                            <!-- Summary will be loaded here -->
                                        </div>
                                    </div>
                                </div>
                                <div class="col-md-6">
                                    <div class="card h-100">
                                        <div class="card-header">
                                            <h6><i class="fas fa-question-circle"></i> Generated Questions (<span id="questionCount">0</span>)</h6>
                                        </div>
                                        <div class="card-body">
                                            <div id="questionsList"></div>
                                            <div class="text-center mt-3">
                                                <button class="btn btn-success btn-modern" onclick="startQuizFromPDF()">
                                                    Start Practice Quiz
                                                </button>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/public/js/upload.js"></script>
    <script src="/public/js/main.js"></script>
</body>
</html>
