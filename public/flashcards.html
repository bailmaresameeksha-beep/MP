<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flashcards - Gate Master AI</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="/public/css/style.css" rel="stylesheet">
</head>
<body>
    <!-- Same navbar -->
    
    <div class="container mt-5 pt-5">
        <div class="row justify-content-center">
            <div class="col-lg-10">
                <div class="card shadow">
                    <div class="card-header bg-success text-white">
                        <h3><i class="fas fa-cards"></i> Smart Flashcards</h3>
                        <p class="mb-0">Review your mistakes with spaced repetition</p>
                    </div>
                    <div class="card-body">
                        <div class="row mb-4">
                            <div class="col">
                                <div class="btn-group w-100" role="group">
                                    <button class="btn btn-outline-primary" onclick="loadFlashcards('new')">
                                        <i class="fas fa-seedling"></i> New
                                    </button>
                                    <button class="btn btn-outline-warning" onclick="loadFlashcards('learning')">
                                        <i class="fas fa-book-reader"></i> Learning
                                    </button>
                                    <button class="btn btn-outline-success" onclick="loadFlashcards('mastered')">
                                        <i class="fas fa-crown"></i> Mastered
                                    </button>
                                </div>
                            </div>
                            <div class="col-auto">
                                <span id="stats" class="badge bg-secondary fs-6">0 cards</span>
                            </div>
                        </div>

                        <div id="flashcardsContainer" class="position-relative">
                            <!-- Flashcards will be loaded here -->
                        </div>

                        <div class="text-center mt-4">
                            <button id="prevBtn" class="btn btn-secondary btn-lg me-3" onclick="prevCard()" disabled>
                                <i class="fas fa-arrow-left"></i> Previous
                            </button>
                            <button id="flipBtn" class="btn btn-primary btn-lg" onclick="flipCard()">
                                Show Answer
                            </button>
                            <button id="nextBtn" class="btn btn-secondary btn-lg ms-3" onclick="nextCard()" disabled>
                                Next <i class="fas fa-arrow-right"></i>
                            </button>
                            <div class="mt-3">
                                <button class="btn btn-success btn-sm me-2" onclick="markCorrect()">
                                    <i class="fas fa-check"></i> Got it!
                                </button>
                                <button class="btn btn-danger btn-sm" onclick="markWrong()">
                                    <i class="fas fa-times"></i> Need more practice
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/public/js/flashcards.js"></script>
    <script src="/public/js/main.js"></script>
</body>
</html>
