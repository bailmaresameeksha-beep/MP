<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Gate Master AI</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/chart.js" rel="stylesheet">
    <link href="/public/css/style.css" rel="stylesheet">
</head>
<body>
    <!-- Same navbar -->
    
    <div class="container-fluid mt-5 pt-5 px-4">
        <div class="row mb-4">
            <div class="col">
                <h2 class="fw-bold"><i class="fas fa-chart-dashboard text-primary"></i> Performance Dashboard</h2>
                <p class="text-muted">Track your GATE preparation progress</p>
            </div>
        </div>

        <!-- Stats Cards -->
        <div class="row g-4 mb-5">
            <div class="col-lg-3 col-md-6">
                <div class="card shadow h-100">
                    <div class="card-body text-center">
                        <i class="fas fa-clipboard-list fa-3x text-primary mb-3"></i>
                        <h3 id="totalAttempts" class="fw-bold">0</h3>
                        <p class="mb-0">Total Quizzes</p>
                    </div>
                </div>
            </div>
            <div class="col-lg-3 col-md-6">
                <div class="card shadow h-100">
                    <div class="card-body text-center">
                        <i class="fas fa-percentage fa-3x text-success mb-3"></i>
                        <h3 id="avgAccuracy" class="fw-bold">0%</h3>
                        <p class="mb-0">Avg Accuracy</p>
                    </div>
                </div>
            </div>
            <div class="col-lg-3 col-md-6">
                <div class="card shadow h-100">
                    <div class="card-body text-center">
                        <i class="fas fa-exclamation-triangle fa-3x text-warning mb-3"></i>
                        <h3 id="weakTopics" class="fw-bold">0</h3>
                        <p class="mb-0">Weak Topics</p>
                    </div>
                </div>
            </div>
            <div class="col-lg-3 col-md-6">
                <div class="card shadow h-100">
                    <div class="card-body text-center">
                        <i class="fas fa-star fa-3x text-info mb-3"></i>
                        <h3 id="strongTopics" class="fw-bold">0</h3>
                        <p class="mb-0">Strong Topics</p>
                    </div>
                </div>
            </div>
        </div>

        <!-- Charts Row -->
        <div class="row g-4 mb-5">
            <div class="col-lg-8">
                <div class="card shadow">
                    <div class="card-header bg-light">
                        <h5><i class="fas fa-chart-line"></i> Accuracy Trend</h5>
                    </div>
                    <div class="card-body">
                        <canvas id="accuracyChart" height="100"></canvas>
                    </div>
                </div>
            </div>
            <div class="col-lg-4">
                <div class="card shadow">
                    <div class="card-header bg-light">
                        <h5><i class="fas fa-list"></i> Topic Wise Performance</h5>
                    </div>
                    <div class="card-body">
                        <div id="topicsList"></div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Recent Activity -->
        <div class="row">
            <div class="col-12">
                <div class="card shadow">
                    <div class="card-header bg-light">
                        <h5><i class="fas fa-history"></i> Recent Quizzes</h5>
                    </div>
                    <div class="card-body">
                        <div id="recentQuizzes" class="list-group list-group-flush"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="/public/js/dashboard.js"></script>
    <script src="/public/js/main.js"></script>
</body>
</html>
